services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC API
    volumes:
      - ./qdrant_storage:/qdrant/storage
      - ./qdrant_snapshots:/qdrant/snapshots
    environment:
      # Performance tuning
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
      
      # Storage configuration
      - QDRANT__STORAGE__STORAGE_PATH=/qdrant/storage
      - QDRANT__STORAGE__SNAPSHOTS_PATH=/qdrant/snapshots
      
      # Performance optimization
      - QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS=0  # 0 = auto-detect CPU cores
      - QDRANT__STORAGE__PERFORMANCE__MAX_OPTIMIZATION_THREADS=1
      
      # Memory management
      - QDRANT__STORAGE__OPTIMIZERS__MEMMAP_THRESHOLD_KB=50000
      - QDRANT__STORAGE__OPTIMIZERS__INDEXING_THRESHOLD_KB=20000
      
      # Write-ahead log configuration
      - QDRANT__STORAGE__WAL__WAL_CAPACITY_MB=32
      - QDRANT__STORAGE__WAL__WAL_SEGMENTS_AHEAD=0
      
      # Cluster configuration (optional - for multi-node setup)
      # - QDRANT__CLUSTER__ENABLED=false
      
      # Security (uncomment and configure for production)
      # - QDRANT__SERVICE__API_KEY=your-secure-api-key-here
      # - QDRANT__SERVICE__READ_ONLY_API_KEY=your-read-only-key-here
      
      # CORS configuration (adjust as needed)
      - QDRANT__SERVICE__ENABLE_CORS=true
      
      # Telemetry (set to false if you want to disable)
      - QDRANT__TELEMETRY_DISABLED=false
      
      # Log level
      - QDRANT__LOG_LEVEL=INFO
    
    # Resource limits (adjust based on your needs)
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    networks:
      - qdrant-network

networks:
  qdrant-network:
    driver: bridge