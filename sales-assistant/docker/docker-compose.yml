services:
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: evolution-api
    ports:
      - "8080:8080"
    environment:
      - SERVER_TYPE=http
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-salesagent}:${POSTGRES_PASSWORD}@postgres:5432/evolution
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER:-salesagent}:${POSTGRES_PASSWORD}@postgres:5432/evolution
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1035194821
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_SAVE_INSTANCES=false
      - CACHE_LOCAL_ENABLED=false
    volumes:
      - evolution_data:/evolution/instances
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: wpp-sales-agent
    ports:
      - "8000:8000"
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kestra:
        condition: service_started
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-sales_agent}
      - POSTGRES_USER=${POSTGRES_USER:-salesagent}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../src/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-salesagent}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  kestra:
    image: kestra/kestra:latest
    container_name: kestra
    ports:
      - "8088:8080"
    user: "root"
    command: server standalone --worker-thread=128
    environment:
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sales_agent}
            driverClassName: org.postgresql.Driver
            username: ${POSTGRES_USER:-salesagent}
            password: ${POSTGRES_PASSWORD}
        flyway:
          datasources:
            postgres:
              baseline-on-migrate: true
        kestra:
          server:
            basicAuth:
              enabled: false
          repository:
            type: postgres
          storage:
            type: local
            local:
              basePath: /app/storage
          queue:
            type: postgres
          tasks:
            tmpDir:
              path: /tmp/kestra-wd/tmp
    volumes:
      - kestra_data:/app/storage
      - ../kestra:/app/flows:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  evolution_data:
  postgres_data:
  kestra_data:

networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1400"
